# Production compose — uses AWS RDS, no local DB container
# Usage: docker compose -f docker-compose.prod.yaml up -d

services:
  app:
    image: url-shortener:latest   # pull from ECR or build locally
    container_name: url-shortener-app
    ports:
      - "8000:8000"
    env_file:
      - .env                      # DATABASE_URL and BASE_URL live here
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
